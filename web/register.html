<!DOCTYPE html>
<html>

<head>

    <title>User Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{

            background:#f5f7fa;

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
        }

        .register-card{

            width:450px;

            border:none;

            border-radius:18px;

            box-shadow:0 10px 30px rgba(0,0,0,0.12);

            padding:10px;
        }

        .logo{

            width:80px;

            height:80px;

            object-fit:contain;

            margin-bottom:15px;
        }

        .register-title{

            font-weight:700;

            color:#1f2937;
        }

        .subtitle{

            color:#6b7280;

            font-size:15px;
        }

        .badge-user{

            background:#e8f5e9;

            color:#198754;

            padding:7px 15px;

            border-radius:30px;

            font-size:13px;

            font-weight:600;
        }

        .form-control{

            border-radius:10px;

            padding:12px;

            border:1px solid #d1d5db;
        }

        .form-control:focus{

            border-color:#198754;

            box-shadow:none;
        }

        .btn-register{

            background:#198754;

            border:none;

            border-radius:10px;

            padding:12px;

            font-weight:600;
        }

        .btn-register:hover{

            background:#157347;
        }

        a{

            text-decoration:none;
        }

        a:hover{

            text-decoration:underline;
        }

    </style>

</head>

<body>

<div class="card register-card">

<div class="card-body p-4">

<div class="text-center">

<img src="images/logo.png"
     class="logo">

<div class="mb-3">

<span class="badge-user">

Create New Account

</span>

</div>

<h2 class="register-title">

Animal Rescue Portal

</h2>

<p class="subtitle">

Join our rescue community

</p>

</div>

<form action="RegisterServlet"
      method="post">

<div class="mb-3">

<label class="form-label">

Full Name

</label>

<input type="text"
       name="name"
       class="form-control"
       placeholder="Enter your full name"
       required>

</div>

<div class="mb-3">

<label class="form-label">

Email Address

</label>

<input type="email"
       name="email"
       class="form-control"
       placeholder="Enter your email"
       required>

</div>

<div class="mb-4">

<label class="form-label">

Password

</label>

<input type="password"
       name="password"
       class="form-control"
       placeholder="Create a password"
       required>

</div>

<button type="submit"
        class="btn btn-register text-white w-100">

Create Account

</button>

</form>

<div class="text-center mt-4">

Already have an account?

<a href="login.html">

Login

</a>

</div>

</div>

</div>

</body>

</html>
