<!DOCTYPE html>
<html>

<head>

    <title>User Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{

            background: linear-gradient(
                    135deg,
                    #0d6efd,
                    #6ea8fe);

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;
        }

        .login-card{

            width:450px;

            border:none;

            border-radius:15px;

            box-shadow:0 4px 20px rgba(0,0,0,0.3);
        }

    </style>

</head>

<body>

<div class="card login-card">

    <div class="card-body p-4">

        <div class="text-center mb-4">

            <h2>

                Animal Rescue System

            </h2>

            <p class="text-muted">

                User Login

            </p>

        </div>

        <form action="LoginServlet"
              method="post">

            <div class="mb-3">

                <label class="form-label">

                    Email Address

                </label>

                <input type="email"
                       name="email"
                       class="form-control"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Password

                </label>

                <input type="password"
                       name="password"
                       class="form-control"
                       required>

            </div>

            <button type="submit"
                    class="btn btn-primary w-100">

                Login

            </button>

        </form>

        <div class="text-center mt-3">

            New User?

            <a href="register.html">

                Register Here

            </a>

        </div>

    </div>

</div>

</body>

</html>
