<!DOCTYPE html>
<html>

<head>

    <title>User Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{

            background:#f5f7fa;

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
        }

        .login-card{

            width:450px;

            border:none;

            border-radius:18px;

            box-shadow:0 10px 30px rgba(0,0,0,0.12);

            padding:10px;
        }

        .logo{

            width:80px;

            height:80px;

            object-fit:contain;

            margin-bottom:15px;
        }

        .login-title{

            font-weight:700;

            color:#1f2937;
        }

        .subtitle{

            color:#6b7280;

            font-size:15px;
        }

        .badge-user{

            background:#e8f5e9;

            color:#198754;

            padding:7px 15px;

            border-radius:30px;

            font-size:13px;

            font-weight:600;
        }

        .form-control{

            border-radius:10px;

            padding:12px;

            border:1px solid #d1d5db;
        }

        .form-control:focus{

            border-color:#198754;

            box-shadow:none;
        }

        .btn-login{

            background:#198754;

            border:none;

            border-radius:10px;

            padding:12px;

            font-weight:600;
        }

        .btn-login:hover{

            background:#157347;
        }

        a{

            text-decoration:none;
        }

        a:hover{

            text-decoration:underline;
        }

    </style>

</head>

<body>

<div class="card login-card">

<div class="card-body p-4">

<div class="text-center">

<img src="images/logo.png"
     class="logo">

<div class="mb-3">

<span class="badge-user">

User Login

</span>

</div>

<h2 class="login-title">

Animal Rescue Portal

</h2>

<p class="subtitle">

Sign in to report and track rescue cases

</p>

</div>

<div id="message" class="mb-3"></div>

<form action="LoginServlet"
      method="post">

<div class="mb-3">

<label class="form-label">

Email Address

</label>

<input type="email"
       name="email"
       class="form-control"
       placeholder="Enter your email"
       required>

</div>

<div class="mb-4">

<label class="form-label">

Password

</label>

<input type="password"
       name="password"
       class="form-control"
       placeholder="Enter your password"
       required>

</div>

<button type="submit"
        class="btn btn-login text-white w-100">

Login

</button>

</form>

<div class="text-center mt-4">

New User?

<a href="register.html">

Create Account

</a>

</div>

</div>

</div>

<script>

const params =
new URLSearchParams(
window.location.search);

const msg =
params.get("msg");

if(msg === "registered")
{
    document.getElementById("message").innerHTML =

    `<div class="alert alert-success">

        Registration Successful!
        Please login.

    </div>`;
}

else if(msg === "exists")
{
    document.getElementById("message").innerHTML =

    `<div class="alert alert-warning">

        Email already registered.
        Please login.

    </div>`;
}

else if(msg === "failed")
{
    document.getElementById("message").innerHTML =

    `<div class="alert alert-danger">

        Invalid email or password.

    </div>`;
}

else if(msg === "logout")
{
    document.getElementById("message").innerHTML =

    `<div class="alert alert-success">

        Logged Out Successfully.

    </div>`;
}

</script>

</body>

</html>
