<!DOCTYPE html>
<html>

<head>

    <title>Admin Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{

            background: linear-gradient(
                    135deg,
                    #14532d,
                    #22c55e);

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;
        }

        .admin-card{

            width:450px;

            border:none;

            border-radius:20px;

            box-shadow:0 10px 25px rgba(0,0,0,0.35);
        }

        .admin-title{

            color:#14532d;

            font-weight:bold;
        }

        .logo{

            font-size:50px;
        }

    </style>

</head>

<body>

<div class="card admin-card">

    <div class="card-body p-5">

        <div class="text-center mb-4">

            <div class="logo">

                ADMIN

            </div>

            <h2 class="admin-title">

                Admin Portal

            </h2>

            <p class="text-muted">

                Animal Rescue Management System

            </p>

        </div>
        
        <div id="message"></div>

        <form action="AdminLoginServlet"
              method="post">

            <div class="mb-3">

                <label class="form-label">

                    Username

                </label>

                <input type="text"
                       name="username"
                       class="form-control"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Password

                </label>

                <input type="password"
                       name="password"
                       class="form-control"
                       required>

            </div>

            <button type="submit"
                    class="btn btn-success w-100">

                Admin Login

            </button>

        </form>

        <div class="text-center mt-3">

            <a href="index.html">

                Back to Home

            </a>

        </div>

    </div>

</div>
    
<script>

const params =
new URLSearchParams(
window.location.search);

const msg =
params.get("msg");

if(msg === "loginfailed")
{
    document.getElementById(
    "message").innerHTML =

    `<div class="alert alert-danger">

        Invalid Admin Username
        or Password.

    </div>`;
}

else if(msg === "logout")
{
    document.getElementById(
    "message").innerHTML =

    `<div class="alert alert-info">

        Logged Out Successfully.

    </div>`;
}

</script>

</body>

</html>
